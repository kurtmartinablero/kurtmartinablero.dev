<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Kurt</title>
    <!-- Make sure style.css is in the same folder! -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="logo">Kurt<span>.dev</span></div>
        <nav>
            <a href="index.html">HOME</a>
        </nav>
    </header>

    <main class="contact-container">
        <h1>Contact Me</h1>

        <!-- The form MUST be here for the script to find it -->
        <form class="contact-form">
            <div class="input-group">
                <input type="text" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <input type="email" placeholder="Your Email" required>
            </div>
            <div class="input-group">
                <textarea placeholder="Your Message" rows="6" required></textarea>
            </div>

            <button type="submit" class="btn-send">Send Message</button>
        </form>

        <div class="social-links">
            <a href="#" class="fb-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook"
                    width="35">
            </a>
        </div>
    </main>

    <!-- FIREBASE SCRIPT SECTION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeQOtv5Qjf6BdUMGd3roh8dshUHL2Jx9o",
            authDomain: "kurtmartinablero21portfolio.firebaseapp.com",
            projectId: "kurtmartinablero21portfolio",
            storageBucket: "kurtmartinablero21portfolio.firebasestorage.app",
            messagingSenderId: "56389986097",
            appId: "1:56389986097:web:f68464af6ba5fa84e6b210",
            measurementId: "G-JNDRPYY9CM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // This waits for the page to load so it can find the form
        const contactForm = document.querySelector('.contact-form');

        if (contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = contactForm.querySelector('input[type="text"]').value;
                const email = contactForm.querySelector('input[type="email"]').value;
                const message = contactForm.querySelector('textarea').value;

                try {
                    await addDoc(collection(db, "messages"), {
                        senderName: name,
                        senderEmail: email,
                        text: message,
                        timestamp: new Date()
                    });

                    alert("Message sent successfully! Thanks, Kurt.");
                    contactForm.reset();
                } catch (error) {
                    console.error("Error: ", error);
                    alert("Failed to send message. Check your Firestore rules!");
                }
            });
        }
    </script>
</body>

</html>
